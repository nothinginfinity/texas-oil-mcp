name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
      - run: npm run build
      - name: Validate Wrangler config shape
        run: npm run check:wrangler
        env:
          CLOUDFLARE_ACCOUNT_ID: 00000000000000000000000000000000
